modLoader="javafml"
loaderVersion="[47,)"
license="MIT"
issueTrackerURL="https://github.com/Dr-kurosuke/Wave-Motion-Gun/issues"

[[mods]]
modId="wave_motion_gun_mod"
# jarのマニフェスト(Implementation-Version)から取得するため gradle.properties の
# mod_version と常に一致する。開発環境(runClient/runServer)では jar が無いため "NONE" と表示される。
version="${file.jarVersion}"
displayName="Wave Motion Gun Mod"
authors="Dr-kurosuke"
credits="宇宙戦艦をテーマにした非公式ファンMod。原作および権利者とは無関係です。"
displayURL="https://github.com/Dr-kurosuke/Wave-Motion-Gun"
description='''
宇宙戦艦をテーマにした波動砲・ショックカノンMod。マルチブロックの主砲を建造し、エネルギーを充填して発射します。Valkyrien Skies / Eureka! の船に搭載可能。

※【必須】本Mod単体では発電できません。Mekanism / Thermal / Immersive Engineering など、FE(Forge Energy)を供給できる工業Modを別途導入してください。無いと主砲を充填できず発射できません。

※本Modは非営利のファン制作物であり、原作およびその権利者とは一切関係ありません。公式のロゴ・画像・音楽は使用していません。
※AIクイズ機能は外部API(Gemini / OpenAI互換)へ通信し、利用にはユーザー自身のAPIキーが必要です。
'''

# --- 必須依存 ---
[[dependencies.wave_motion_gun_mod]]
modId="forge"
mandatory=true
versionRange="[47,)"
ordering="NONE"
side="BOTH"

[[dependencies.wave_motion_gun_mod]]
modId="minecraft"
mandatory=true
versionRange="[1.20.1,1.21)"
ordering="NONE"
side="BOTH"

# --- 任意依存(強く推奨。無くても単体で動作する) ---
# 船に主砲を載せる遊び方の前提。VSCompatにより未導入環境でも安全に動作する
[[dependencies.wave_motion_gun_mod]]
modId="valkyrienskies"
mandatory=false
versionRange="*"
ordering="AFTER"
side="BOTH"

[[dependencies.wave_motion_gun_mod]]
modId="vs_eureka"
mandatory=false
versionRange="*"
ordering="AFTER"
side="BOTH"

# --- エネルギー源について ---
# 本Modは発電手段を持たず、FE(Forge Energy)の供給Modが実質「必須」。
# ただし特定のModに依存しているわけではなく、FEを出力できるModなら何でもよい
# (Mekanism / Thermal / Immersive Engineering など)。
# mods.toml は「いずれかのModがあればよい」というOR条件を表現できないため、
# ここで mekanism を mandatory=true にすると Mekanism 以外のFE Modを使う
# プレイヤーが起動できなくなってしまう。よって代表例として mandatory=false で
# 宣言するに留め、必須である旨は description と README に明記する。
[[dependencies.wave_motion_gun_mod]]
modId="mekanism"
mandatory=false
versionRange="*"
ordering="AFTER"
side="BOTH"
